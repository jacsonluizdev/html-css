<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form action="" method="get">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="ifem">
            <label for="ifem">Feminino</label><br>
            <input type="radio" name="sexo" id="imas">
            <label for="imas">Masculino</label>
            <!--Importante frisar que no caso do type radio o "name" deve ser o mesmo em todos assim permitindo que o usuario selecione apenas uma das opções.-->
        </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="fut" id="ifut">
            <label for="ifut">Futebol</label><br>
            <input type="checkbox" name="bas" id="ibas">
            <label for="ibas">Basquete</label><br>
            <input type="checkbox" name="vol" id="ivol">
            <label for="ivol">Volei</label>
        </fieldset>
        <p>
            <input type="reset" value="Apagar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
