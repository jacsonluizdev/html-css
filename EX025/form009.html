<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formuário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="" method="post">
        <p>
            <label for="inum">Número:</label>
            <input type="range" id="inum" name="numero" min="0" max="10" required oninput="ival.innerHTML = inum.value">
            <!-- O atributo "oninput" atualiza o valor do elemento <output> sempre que o usuário move o slider -->
            <output id="ival">5</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
