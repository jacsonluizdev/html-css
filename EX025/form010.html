<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="" method="post">
        <p>
            <label for="iano">Ano de nascimento:</label>
            <input type="number" id="iano" name="ano" min="1960" max="2024" required placeholder="1960" oninput="calcIdade()"> 
        </p>
        
        <p>
            <label for="iida">Idade:</label>
            <output id="iida">0</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        <script>
            function calcIdade(){
                let ano = new Date().getFullYear(); // Obtém o ano atual
                iida.innerHTML = Number(ano) - Number(iano.value); // Calcula a idade //subtraindo o ano de nascimento do ano atual 
            }
        </script>

    </form>
</body>
</html>
