<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Meu primeiro formulário</h1>
    <form action="cadastro.php" method="post"  autocomplete="off"> <!--Por padrão o "method" vira como "GET" mas podemos alterar para "POST" lembrando que isso não é um metodo de segurança apenas muda a forma como o dado é enviado.-->
        <p><label for="inome">Nome:</label> <input type="text" name="nome" id="inome"></p>
        <p><label for="isobrenome">Sobrenome:</label> <input type="text" name="sobrenome" id="isobrenome"></p>
        <input type="submit" value="Enviar">
        <!--Sempre lembrar de relacionar o "input" com seu "label", todo formulario deve ser assim.-->
    </form>
</body>
</html>
