<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset><!--Desta forma posso agrupar grupos de conteudos relacionados.-->
            <legend>Dados Pessoais</legend><!--Posso adicionar uma legenda a esse grupo. Posso personalizar com CSS livremente.-->
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" required>
            </p>
            <p>
                <label for="iemail">Email:</label>
                <input type="email" name="email" id="iemail" required autocomplete="email">
            </p>
            <p>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" required autocomplete="tel" placeholder="(xx)xxxxx-xxxx">
                <!--Estudar sobre RegEx-->
            </p>
        </fieldset>
        <p>
             <input type="submit" value="Enviar">
             <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
