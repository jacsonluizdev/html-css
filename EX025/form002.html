<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Formulario</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="cadastro.php" method="post">
        <p>
            <label for="iusu">Usuário:</label><input type="text" name="usu" id="iusu" required minlength="5" maxlength="10">
            <!--Utilizando os parametros "minlength e maxlength" posso controlar o minimo e maximo de caracteres que esse campo respectivamente exige.-->
        </p>
        <p>
            <label for="isen">Senha:</label><input type="password" name="sen" id="isen" required minlength="8" maxlength="12">
            <!--Utilizando o atributo "required" dentro do "input" ele se tornará obrigatorio de ser preenchido antes de ser enviado.-->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
